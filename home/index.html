<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTools-OCalc - 个人工具箱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../assets/JTools-light.ico" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航 -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon"><img src="../assets/JTools-light.png" alt="JTools-OCalc" style="height:32px;width:32px;"></div>
                    <div class="logo-text">
                        <h1>JTools-OCalc</h1>
                        <span class="version-badge">v1.0.0</span>
                    </div>
                </div>
                <div class="header-subtitle">轻量级离线工具集合</div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="app-main">
            <div class="container">
                <!-- 工具网格 -->
                <div class="tools-grid" id="toolsGrid">
                    <!-- 工具卡片将由JavaScript动态生成 -->
                </div>
            </div>
        </main>

        <!-- 页脚 -->
    </div>
    <script src="../assets/config.js"></script>
    <script src="../assets/footer.js"></script>
    <script src="main.js"></script>
</body>
</html>
